{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | Hospital Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:
                linear-gradient(rgba(8,45,40,0.35), rgba(8,45,40,0.35)),
                url("{% static 'images/hospital_bg.jpg' %}");
            background-size:cover;
            background-position:center;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial, sans-serif;
        }

        .login-card{
    position:relative;
    width:460px;
    padding:34px;
    border-radius:28px;
    background:rgba(255,255,255,0.78);
    backdrop-filter:blur(14px);
    box-shadow:0 20px 45px rgba(0,0,0,0.28);
    overflow:hidden;

    animation:fadeUp .7s ease;
}

        .login-card::before{
            content:"";
            position:absolute;
            inset:0;
            background:url("{% static 'images/hospital_logo.png' %}") center/260px no-repeat;
            opacity:0.045;
            z-index:0;
        }

        .login-card > *{
            position:relative;
            z-index:1;
        }

        .logo{
            height:95px;
            width:110px;
            object-fit:contain;
        }

        .system-title{
            color:#0b5f52;
            font-size:25px;
            font-weight:750;
            letter-spacing:.5px;
            text-shadow:1px 1px 2px rgba(0,0,0,.18);
            margin-top:10px;
        }

        .hospital-title{
            font-size:15px;
            font-weight:600;
            color:#222;
            letter-spacing:1.5px;
            margin-bottom:26px;
        }

        .form-label{
            font-weight:800;
            color:#1f403b;
        }

        .form-control{
            border-radius:14px;
            padding:12px 14px;
            border:1px solid rgba(0,105,92,.25);
            background:rgba(255,255,255,.75);
        }

        .form-control:focus{
            border-color:#00695c;
            box-shadow:0 0 0 .2rem rgba(0,105,92,.18);
        }

        .login-btn{
            border-radius:15px;
            padding:12px;
            font-weight:900;
            font-size:17px;
            background:linear-gradient(135deg,#00695c,#0b8f7d);
            border:none;
        }

        .change-password{
            text-decoration:none;
            color:#00695c;
            font-weight:900;
        }

        .footer-text{
            color:#244843;
            font-weight:800;
        }

        @media(max-width:520px){
            .login-card{
                width:92%;
                padding:26px;
            }

            .system-title{
                font-size:28px;
            }

            .logo{
                height:80px;
                width:95px;
            }
        }

        @keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.login-btn{
    transition:.3s;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 8px 20px rgba(0,105,92,.3);

}
    </style>
</head>

<body>

<div class="login-card text-center">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <img src="{% static 'images/hospital_logo.png' %}" class="logo">
        <img src="{% static 'images/company_logo.png' %}" class="logo">
    </div>

    <h2 class="system-title">
        Hospital Management System
    </h2>

    <p class="hospital-title">
        UMM ALQURA Dental Teaching Hospital
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success login-btn w-100">
            Login
        </button>
    </form>

    {% if form.errors %}
        <div class="alert alert-danger mt-3">
            Invalid username or password
        </div>
    {% endif %}

    <div class="mt-3">
        <a href="{% url 'change_password' %}" class="change-password">
            🔑 Change Password
        </a>
    </div>

    <div class="mt-4 small footer-text">
        Powered by Eng. Ibrahem Taher Kamel
    </div>

</div>

</body>
</html>
