{% extends 'cssd/base.html' %}

{% block title %}Access Denied{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow border-0 text-center">

        <div class="card-body p-5">

            <h2 class="text-danger fw-bold mb-3">
                Access Denied
            </h2>

            <p class="fs-5">
                You are not authorized to access this device.
            </p>

            <p class="text-muted">
                This asset belongs to another department or location.
            </p>

            <a href="{% url 'system_selection' %}"
               class="btn btn-primary mt-3">
                Back to System
            </a>

        </div>

    </div>

</div>

{% endblock %}
